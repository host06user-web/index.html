<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEM VINDO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="login-container" class="box">
        <h1>HOST_CHAT</h1>
        <p>CODENAME:</p>
        <input type="text" id="username" placeholder="Digite seu nick..." autocomplete="off">
        <br><br>
        <button onclick="startChat()">ENTRAR</button>
    </div>

    <div id="chat-container" class="box hidden">
        <div id="chat-header"><span id="user-display">CONECTADO</span></div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Comando...">
            <button id="send-btn" onclick="enviar()">ENVIAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
