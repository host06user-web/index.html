<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_HACKER | Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>

    <!-- TELA DE ENTRADA -->
    <div id="login-container" class="box">
        <h1>SISTEMA_INVASÃO</h1>
        <p>IDENTIFIQUE-SE PARA ENTRAR NA REDE:</p>
        <input type="text" id="username" placeholder="Codename..." autocomplete="off">
        <button onclick="startChat()">INFILTRAR</button>
    </div>

    <!-- JANELA DE CHAT -->
    <div id="chat-container" class="box hidden">
        <div id="chat-header">
            <span id="user-display">CONEXÃO_ESTABELECIDA</span>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Digite sua mensagem...">
            <button id="send-btn">ENVIAR</button>
        </div>
    </div>

    <!-- BIBLIOTECA SUPABASE -->
    <script src="https://jsdelivr.net"></script>
    <script src="script.js"></script>
</body>
</html>
