<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOST CHAT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>

    <!-- LOGIN -->
    <div id="login-container" class="box">
        <h1>SLA ENTRA AI</h1>
        <p>CODENAME:</p>
        <input type="text" id="username" placeholder="Digite seu nick..." autocomplete="off">
        <br><br>
        <button id="btn-login">INFILTRAR</button>
    </div>

    <!-- CHAT (COMEÇA ESCONDIDO PELO CSS) -->
    <div id="chat-container" class="box hidden">
        <div id="chat-header"><span id="user-display">CONECTADO</span></div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Comando...">
            <button id="btn-send">ENVIAR</button>
        </div>
    </div>

    <!-- CARREGAMENTO DOS SCRIPTS NO FINAL -->
    <script src="https://jsdelivr.net"></script>
    <script src="script.js"></script>
</body>
</html>
